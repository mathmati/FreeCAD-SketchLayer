<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .seg   { fill:none; stroke:#3d6d8f; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
      .guide { stroke:#d0392b; stroke-width:1.6; stroke-dasharray:3 3; stroke-linecap:round; }
      .dot   { fill:#2ca02c; stroke:#186018; stroke-width:1; }
    </style>
  </defs>
  <circle class="seg" cx="32" cy="32" r="20" />
  <line class="guide" x1="32" y1="32" x2="52" y2="32" />
  <circle class="dot" cx="32" cy="32" r="3.5" />
  <circle class="dot" cx="52" cy="32" r="3" />
</svg>
